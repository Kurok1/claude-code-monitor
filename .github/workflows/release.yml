name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - target: linux-arm64
            os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          # darwin-amd64 (Intel Macs) was dropped: macos-13 is the last
          # Intel runner image GitHub offers, the queue depth is unreliable
          # (jobs frequently stall waiting for a free runner), and Intel Mac
          # share among devs has been declining since 2020. Users on Intel
          # Macs can build from source: `go build ./cmd/server`.
          - target: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - target: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (embed into binary)
        shell: bash
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm run build
          # Sanity: vite writes to ../internal/web/dist; //go:embed all:dist
          # in internal/web/web.go picks it up. If this file is missing the
          # released binary would silently fall back to the plain-text "/"
          # page — fail fast instead.
          test -f ../internal/web/dist/index.html

      - name: Configure MinGW (windows)
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          # duckdb-go-bindings ships UCRT-built static libs; MSVCRT toolchain
          # (MINGW64) fails to link with undefined __stdio_common_* refs.
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-pkgconf zip
          path-type: inherit

      - name: Build (unix)
        if: matrix.goos != 'windows'
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          NAME="claude-code-monitor_${VERSION}_${{ matrix.target }}"
          go build -trimpath -ldflags "-s -w" -o "dist/${NAME}/claude-code-monitor${{ matrix.ext }}" ./cmd/server
          cp config.example.yaml "dist/${NAME}/"
          tar -C dist -czf "dist/${NAME}.tar.gz" "${NAME}"
          ( cd dist && shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )

      - name: Build (windows)
        if: matrix.goos == 'windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          NAME="claude-code-monitor_${VERSION}_${{ matrix.target }}"
          go build -trimpath -ldflags "-s -w" -o "dist/${NAME}/claude-code-monitor${{ matrix.ext }}" ./cmd/server
          cp config.example.yaml "dist/${NAME}/"
          ( cd dist && /usr/bin/zip -r "${NAME}.zip" "${NAME}" )
          ( cd dist && sha256sum "${NAME}.zip" > "${NAME}.zip.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          # Filter to binary build artifacts only. Without a pattern, this
          # step also pulls the docker-digests-* artifacts (0-byte hex-named
          # files used by the docker-manifest job) and their unzip fails the
          # whole release step.
          pattern: '{linux,darwin,windows}-*'
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > checksums.txt
          ls -lh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true

  docker-build:
    name: Docker ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          # push-by-digest emits only an arch-specific manifest blob (no tag).
          # The downstream docker-manifest job stitches them into a multi-arch
          # tag list so the release publishes one logical image, not two.
          outputs: type=image,name=${{ steps.img.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: docker-digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Docker manifest
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: docker-digests-*
          path: /tmp/digests
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          # Disable the action's auto "latest" — we enable it explicitly below
          # only for stable tags (no `-rc1` / `-beta.X` suffix).
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          tag_args=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<<'${{ steps.meta.outputs.json }}')
          digest_refs=$(printf '${{ steps.img.outputs.name }}@sha256:%s ' *)
          docker buildx imagetools create $tag_args $digest_refs

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ steps.img.outputs.name }}:${{ steps.meta.outputs.version }}
