server:
  grpc_listen: "0.0.0.0:4317"

storage:
  duckdb_path: "/data/monitor.duckdb"

ingest:
  batch_size: 500
  flush_interval: "5s"
  buffer_hard_limit: 50000

capture:
  enabled: false
  dir: "/data/captured"

stats:
  listen: "0.0.0.0:9100"
  enable_pprof: false

dashboard:
  top_n:
    tools: 10
    skills: 10
  timezone: "Asia/Shanghai"

logging:
  level: "info"
  format: "json"

# 第三方模型成本估算(Codex 等)。默认关闭。启用时 source_file 需挂载进容器。
