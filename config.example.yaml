server:
  grpc_listen: "0.0.0.0:4317"

storage:
  duckdb_path: "./data/monitor.duckdb"

ingest:
  batch_size: 500              # 单 buffer 满 N 行立即 flush
  flush_interval: "5s"         # 至少每 N 秒 flush 一次
  buffer_hard_limit: 50000     # 超过则丢最旧

capture:
  enabled: false               # 仅采集 OTLP 样本时开启 (P2 起生效)
  dir: "./captured"

stats:
  listen: "127.0.0.1:9100"     # "" 禁用；HTTP 监听地址，仅本机访问推荐 127.0.0.1
  enable_pprof: true           # 暴露 /debug/pprof/* 便于本地排查

dashboard:
  top_n:
    tools: 10                  # 工具排名 Top N
    skills: 10                 # Skill 排名 Top N
  timezone: "Asia/Shanghai"    # 业务时区，全部时间窗按此切分
  # 用量热点图 (/api/usage/heatmap) 每天的综合强度权重。
  # score = (w_tokens·norm(tokens) + w_cost·norm(cost) + w_requests·norm(requests)) / Σw
  # 各指标按最近 360 天窗口内的最大值归一化到 [0,1] (空白天 = 0)。
  # 权重为相对值 (只看比例)；三者全为 0 时回退默认 0.4/0.4/0.2。
  heatmap:
    w_tokens: 0.4
    w_cost: 0.4
    w_requests: 0.2
  # model_groups: 自定义聚合规则。按顺序匹配,首个命中生效;未命中时若符合
  # claude-(opus|sonnet|haiku)-X-Y 模式,内置规则会输出 family-X.Y;否则保留原名。
  # `group` 可用 $1/$2 反向引用正则捕获组。
  # 示例:
  # model_groups:
  #   - pattern: '(?i)^deepseek-.*'           # 把所有 deepseek 变体合并成单一组
  #     group:   'deepseek'
  #   - pattern: '(?i)^gpt-(\d+)\..*'         # gpt-4o → gpt-4
  #     group:   'gpt-$1'
  #   - pattern: '(?i)^claude-opus-.*'        # 覆盖内置:全部 opus 合并(不分版本)
  #     group:   'opus'

logging:
  level: "info"                # debug / info / warn / error
  format: "json"               # json / text
